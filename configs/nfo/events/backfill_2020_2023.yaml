# Sourced macro-event backfill for 2020-08-01 → 2023-12-31.
#
# Consumed by scripts/nfo/historical_backtest.py to extend the hardcoded
# HARD_EVENTS list that feeds the V3 event-risk gate. Every entry here MUST
# carry a primary-source URL. If a date cannot be confirmed from the relevant
# primary source, it is recorded with `event_date: null` and
# `status: unresolved` — these rows are non-binding for the gate but explicit
# in the audit trail.
#
# Sources (primary only):
#   RBI MPC        → rbi.org.in press releases (BS_PressReleaseDisplay)
#   FOMC           → federalreserve.gov/monetarypolicy/fomccalendars.htm
#                    and fomchistorical2020.htm for 2020
#   US CPI         → bls.gov/news.release/archives/cpi_MMDDYYYY.{htm,pdf}
#                    (filename embeds the release date)
#   Union Budget   → indiabudget.gov.in (Ministry of Finance)
#
# All `accessed_on` values are 2026-04-21 (this session). Re-fetch if a
# reviewer wants fresher confirmation.

version: 1
window_start: 2020-08-01
window_end: 2023-12-31
accessed_on: 2026-04-21
author: claude-code@2026-04-21
notes: >
  NIFTY-only backfill. RBI + FOMC + Budget are complete within the window
  from primary sources. US CPI is partial (~56% confirmed); remaining
  entries are flagged `status: unresolved` with the BLS archive URL
  convention so a reviewer can fill them in by confirming each
  `cpi_MMDDYYYY.{htm,pdf}` archive file exists on bls.gov.

